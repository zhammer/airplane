<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; }
      body { width: 480px; height: 360px; overflow: hidden; background: #000; }
      #game { position: relative; width: 480px; height: 360px; }
      #wave-bg {
        position: absolute;
        bottom: 0; left: 0;
        width: 480px;
        pointer-events: none;
        z-index: 0;
      }
    </style>
  </head>
  <body>
    <div id="game">
      <img id="wave-bg" src="/assets/wave.gif" />
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
